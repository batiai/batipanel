# ~/.tmux.conf

# enable mouse (click, drag, scroll)
set -g mouse on

# start index at 1 (easier keyboard access)
set -g base-index 1
setw -g pane-base-index 1

# status bar at bottom
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left ' #[fg=colour2]#S #[fg=colour8]│ '
set -g status-right '#[fg=colour8]│ #[fg=colour2]%H:%M #[fg=colour8]│ #[fg=colour3]%Y-%m-%d '
set -g status-left-length 20
set -g status-right-length 30

# active pane highlight
set -g pane-active-border-style fg=colour2

# switch panes (Alt+arrow)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# resize panes (prefix + arrow)
bind -r Left resize-pane -L 3
bind -r Right resize-pane -R 3
bind -r Up resize-pane -U 3
bind -r Down resize-pane -D 3

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# scroll history
set -g history-limit 10000

# clipboard integration (copy-mode → system clipboard)
# macOS
if-shell "uname -s | grep -q Darwin" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"
# WSL
if-shell "grep -qi microsoft /proc/version 2>/dev/null" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'"
# Linux (X11/Wayland)
if-shell "command -v xclip >/dev/null 2>&1" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# Use the user's default shell
set -g default-shell "$SHELL"
